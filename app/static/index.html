<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Assistant — AI-Powered Recommendations</title>
    <meta name="description" content="Get expert SHL assessment recommendations for your hiring, development, and talent management needs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header" id="app-header">
            <div class="header-left">
                <div class="logo-mark" style="font-size: 28px; font-weight: 700; color: #4a4a4a; font-family: sans-serif; display: flex; align-items: baseline; background: white; padding: 4px 12px; border-radius: 8px;">
                    <span style="letter-spacing: -1px;">SHL</span><span style="color: #72d653; font-size: 32px; line-height: 0;">.</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="btn-new-chat" title="New conversation" aria-label="New conversation">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
                <div class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Online</span>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <!-- Welcome screen -->
            <div class="welcome-screen" id="welcome-screen">
                <h2>Assessment Recommender</h2>
                <p>Describe the role, seniority, skills, or industry to get SHL assessment recommendations.</p>
                <div class="quick-prompts">
                    <button class="quick-prompt" data-prompt="We need to hire senior software engineers with Java and cloud experience.">
                        Recommend for Senior Software Engineer (Java, Cloud)
                    </button>
                    <button class="quick-prompt" data-prompt="We are screening 500 entry-level contact centre agents for customer service.">
                        Assessments for Entry-Level Contact Center Agents
                    </button>
                    <button class="quick-prompt" data-prompt="We need a solution for senior leadership roles like CXOs and directors.">
                        Leadership Assessments for CXOs and Directors
                    </button>
                    <button class="quick-prompt" data-prompt="Looking for assessments for graduate financial analysts with no work experience.">
                        Graduate Financial Analysts (No Experience)
                    </button>
                </div>
            </div>

            <!-- Messages container -->
            <div class="messages-container" id="messages-container"></div>
        </main>

        <!-- Input Area -->
        <footer class="input-area" id="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="message-input" 
                    placeholder="Describe your hiring need..."
                    rows="1"
                    aria-label="Message input"
                ></textarea>
                <button class="btn-send" id="btn-send" title="Send message" aria-label="Send message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint">
                Press <kbd>Enter</kbd> to send, <kbd>Shift+Enter</kbd> for new line
            </div>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
